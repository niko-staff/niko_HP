<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧸にこのHP🧙 - ログイン</title>
    <link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --niko-pink-light: #ffe6ea;
            --niko-pink: #ffb5c5;
            --niko-cream: #fffaf0;
            --niko-gold: #f0e68c;
            --niko-brown: #8b4513;
            --font-main: 'Mochiy+Pop One', sans-serif;
            --font-sub: 'Quicksand', sans-serif;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--niko-pink-light); color: var(--niko-brown);
            font-family: var(--font-main); overflow: hidden;
            background-image: 
                radial-gradient(var(--niko-pink) 10%, transparent 11%),
                radial-gradient(var(--niko-pink) 10%, transparent 11%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            opacity: 0.9;
        }

        /* スタート画面 */
        #start-overlay {
            position: fixed; inset: 0; z-index: 5000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, var(--niko-cream) 0%, var(--niko-pink-light) 100%);
            transition: all 1s ease;
        }

        #link-start-text {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(2);
            font-size: 60px; font-weight: 800; letter-spacing: 10px;
            opacity: 0; pointer-events: none; z-index: 6000;
            text-shadow: 2px 2px 0 var(--niko-cream);
            color: var(--niko-brown);
        }

        /* ボタン */
        .btn-sao { 
            background: var(--niko-pink); border: 4px solid var(--niko-cream); color: #fff; 
            padding: 15px 60px; cursor: pointer; font-family: inherit; font-size: 20px; letter-spacing: 3px; 
            transition: 0.4s ease; border-radius: 50px;
            box-shadow: 0 5px 0 var(--niko-pink-light);
        }
        .btn-sao:hover { background: var(--niko-cream); color: var(--niko-pink); transform: translateY(3px); box-shadow: 0 2px 0 var(--niko-pink-light); }
        .btn-sao.pulse { animation: pulse-pink 2s infinite; }

        /* ログイン画面 */
        #login-screen {
            position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 500;
        }

        .auth-card { 
            background: var(--niko-cream); 
            border: 6px solid var(--niko-pink); padding: 50px; 
            border-radius: 30px;
            width: 400px; height: 350px; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            box-shadow: 0 10px 30px rgba(255, 181, 197, 0.4); 
            position: relative;
        }
        .auth-card::before { content: "📖"; position: absolute; top: -30px; left: -30px; font-size: 60px; transform: rotate(-20deg); }
        .auth-card::after { content: "✨"; position: absolute; bottom: -20px; right: -20px; font-size: 50px; animation: heartbeat 1.5s infinite; }

        /* アニメーション */
        .dissolve { animation: dissolve-anim 0.8s forwards; }
        @keyframes dissolve-anim { 0% { opacity: 1; transform: scale(1); filter: blur(0); } 100% { opacity: 0; transform: scale(1.1); filter: blur(15px); } }
        @keyframes link-start-anim { 
            0% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); letter-spacing: 20px; filter: blur(10px); } 
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1); letter-spacing: 10px; filter: blur(0); } 
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.95); filter: blur(5px); } 
        }
        @keyframes heartbeat { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes pulse-pink { 0% { box-shadow: 0 0 0 0 rgba(255, 181, 197, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 181, 197, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 181, 197, 0); } }
    </style>
</head>
<body>

    <div id="start-overlay">
        <div style="font-size: 80px; margin-bottom: 30px; animation: heartbeat 2s infinite;">🧸🍰✨</div>
        <button class="btn-sao pulse" onclick="initiateLinkStart()">にこの世界へ</button>
        <div style="margin-top: 30px; font-size: 14px; letter-spacing: 3px; opacity: 0.7; color: var(--niko-brown);">にこちゃんの笑顔の魔法をかけるよ！</div>
    </div>
    <div id="link-start-text">🧸</div>

    <div id="login-screen">
        <div class="auth-card">
            <div style="font-size: 28px; letter-spacing: 5px; margin-bottom: 30px; color:var(--niko-pink); text-shadow:1px 1px 0 #fff;">にこの秘密の部屋へ</div>
            <div style="font-size: 12px; margin-bottom: 5px; opacity: 0.8; color: var(--niko-brown);">あなたのお名前は？</div>
            <div id="user-id" style="font-size: 20px; border-bottom: 3px solid var(--niko-gold); min-width: 180px; text-align: center; margin-bottom: 20px; color:var(--niko-brown);"></div>
            <div style="font-size: 12px; margin-bottom: 5px; opacity: 0.8; color: var(--niko-brown);">魔法の合言葉</div>
            <div id="user-pw" style="font-size: 20px; border-bottom: 3px solid var(--niko-gold); min-width: 180px; text-align: center; color:var(--niko-brown);"></div>
        </div>
    </div>

    <script>
        const wait = ms => new Promise(r => setTimeout(r, ms));

        async function initiateLinkStart() {
            const overlay = document.getElementById('start-overlay');
            overlay.style.opacity = "0";
            overlay.style.transform = "scale(1.1)";
            await wait(500);
            overlay.style.display = 'none';
            const lsText = document.getElementById('link-start-text');
            lsText.style.animation = "link-start-anim 1.5s forwards";
            await wait(1200);
            boot();
        }

        async function boot() {
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('user-id').textContent = "";
            document.getElementById('user-pw').textContent = "";
            
            await wait(1000);
            // ログイン情報をにこさん風に、ゆっくりタイプ
            for (let c of "にこにこ隊") { document.getElementById('user-id').textContent += c; await wait(150); }
            await wait(400);
            for (let c of "にことニコニコ") { document.getElementById('user-pw').textContent += c; await wait(150); }
            
            await wait(1000);
            document.getElementById('login-screen').classList.add('dissolve');
            await wait(800);
            
            // ログイン完了。ローカルストレージに状態を保存
            localStorage.setItem('isLoggedIn', 'true');
            // index.htmlにリダイレクト
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
