<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>チャットボット - にこのHP</title>
    <link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --niko-pink-light: #ffe6ea;
            --niko-pink: #ffb5c5;
            --niko-cream: #fffaf0;
            --niko-gold: #f0e68c;
            --niko-brown: #8b4513;
            --font-main: 'Mochiy+Pop One', sans-serif;
            --font-sub: 'Quicksand', sans-serif;
        }

        /* 全体の背景設定 */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--niko-pink-light); color: var(--niko-brown);
            font-family: var(--font-main); 
            overflow: hidden; /* チャットエリア内でスクロールさせるため */
        }

        /* 共通コンテナ */
        .container {
            position: fixed; inset: 0; display: flex; flex-direction: column; z-index: 500;
            background: radial-gradient(circle, var(--niko-cream) 0%, var(--niko-pink-light) 100%);
        }

        /* ヘッダー：お知らせページのスタイルを完全継承 */
        header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px 50px; background: #fff; box-shadow: 0 2px 10px rgba(255, 181, 197, 0.3);
            border-bottom: 4px solid var(--niko-pink);
            z-index: 10;
        }

        header h1 {
            font-size: 28px; color: var(--niko-pink); margin: 0;
            text-shadow: 1px 1px 0 #fff;
        }

        header a {
            background: var(--niko-pink); color: #fff; padding: 10px 20px;
            border-radius: 20px; text-decoration: none; font-size: 14px;
            border: 2px solid var(--niko-cream); transition: 0.3s ease;
        }

        header a:hover {
            background: var(--niko-cream); color: var(--niko-pink);
        }

        /* チャットエリアのレイアウト */
        main {
            flex: 1; position: relative; display: flex; flex-direction: column; overflow: hidden;
        }

        /* キャラクター背景 */
        #character-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1; opacity: 0.6; /* 文字を読みやすくするため少し薄く */
        }

        /* メッセージ表示部 */
        #messages {
            flex: 1; position: relative; z-index: 2;
            padding: 30px 50px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 15px;
        }

        /* 吹き出しスタイル：にこのHP仕様 */
        .msg {
            padding: 15px 25px; border-radius: 20px; max-width: 70%;
            font-size: 18px; line-height: 1.6; box-shadow: 0 4px 10px rgba(255, 181, 197, 0.2);
            animation: slideIn 0.4s ease-out;
        }
        .bot { 
            background: #fff; align-self: flex-start; color: var(--niko-brown);
            border-left: 6px solid var(--niko-pink);
        }
        .user { 
            background: var(--niko-pink); align-self: flex-end; color: #fff; 
            font-family: var(--font-sub);
        }

        /* 入力エリア */
        #input-area {
            position: relative; z-index: 3;
            background: #fff; padding: 20px 50px;
            display: flex; gap: 15px; border-top: 2px solid var(--niko-pink-light);
        }
        input { 
            flex: 1; padding: 15px 25px; font-size: 16px; font-family: var(--font-sub);
            border: 2px solid var(--niko-pink-light); border-radius: 30px; outline: none;
            color: var(--niko-brown); background: var(--niko-cream);
        }
        input:focus { border-color: var(--niko-pink); }
        button { 
            background: var(--niko-pink); color: white; border: none; 
            padding: 0 30px; border-radius: 30px; cursor: pointer; 
            font-family: var(--font-main); font-size: 16px; transition: 0.3s;
        }
        button:hover { background: var(--niko-gold); color: var(--niko-brown); }

        /* アニメーション */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* スクロールバー */
        #messages::-webkit-scrollbar { width: 8px; }
        #messages::-webkit-scrollbar-track { background: transparent; }
        #messages::-webkit-scrollbar-thumb { background: var(--niko-pink); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>にことおしゃべり</h1>
            <a href="index.html">← ホームへ戻る</a>
        </header>

        <main>

            <div id="messages">
                <div class="msg bot">やっほー！にこだよ🧸<br>なにか聞きたいことある？</div>
            </div>
            
            <div id="input-area">
                <input type="text" id="user-input" placeholder="例：プロフィール、今日の配信、5/5の予定" autocomplete="off">
                <button onclick="chatProcess()">送信</button>
            </div>
        </main>
    </div>

<script>
    /* --- 1. データ設定 --- */
    const profileText = "名前：にこ🧸\n好きなこと：みんなとのおしゃべり、美味しいもの食べること！\n最強に可愛いホームページを作ってもらってご機嫌なんだ( *´꒳`*)";

    const scheduleData = {
        "2026-05-04": "23:00〜：漢字でGO!",
        "2026-05-05": "23:00〜：リスナー参加型（マリオカート８DX）",
        "2026-05-06": "22:00〜：リスナー参加型（スマブラ）",
        "2026-05-07": "22:00〜：ゆる雑 〜トモコレを添えて〜",
        "2026-05-08": "22:00〜：ゆる雑",
        "2026-05-09": "23:00〜：ゆる雑",
        "2026-05-10": "23:00〜：トモコレ"
    };

    const status = { hitgame_flg: false, hit_answer: null };

    /* --- 2. メイン処理 --- */
    function chatProcess() {
        const input = document.getElementById("user-input");
        const msgVal = input.value.trim();
        if(!msgVal) return;

        addMessage(msgVal, "user");
        input.value = "";

        const botMsgDiv = addMessage("考え中...", "bot");

        setTimeout(() => {
            handleLogic(msgVal, botMsgDiv);
        }, 800);
    }

    function handleLogic(message, msgElement) {
        let replyText = "";
        const dateMatch = message.match(/(\d{1,2})[月\/\-](\d{1,2})/);

        if (status.hitgame_flg) {
            const userNum = parseInt(message);
            if (isNaN(userNum)) {
                replyText = "数字で答えてほしいな！";
            } else if (userNum === status.hit_answer) {
                replyText = `正解！！答えは ${status.hit_answer} だよ！やったね！`;
                status.hitgame_flg = false;
            } else {
                replyText = userNum > status.hit_answer ? "もっと小さいよ〜" : "もっと大きいよ〜";
            }
        } 
        else {
            if (message.includes("プロフィール") || message.includes("自己紹介")) {
                replyText = profileText;
            }
            else if (dateMatch) {
                const m = dateMatch[1].padStart(2, '0');
                const d = dateMatch[2].padStart(2, '0');
                const key = `2026-${m}-${d}`;
                replyText = scheduleData[key] ? `${m}月${d}日の予定は、${scheduleData[key]} だよ！` : `${m}月${d}日はまだ予定がないみたい。`;
            }
            else if (message.includes("今日") && message.includes("配信")) {
                const todayKey = getFormattedDate(new Date());
                replyText = scheduleData[todayKey] ? `今日の予定は ${scheduleData[todayKey]} だよ！楽しみだね！` : "今日はのんびりする予定だよ〜( *´꒳`*)";
            }
            else if (message.includes("明日") && message.includes("配信")) {
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 1);
                const key = getFormattedDate(tomorrow);
                replyText = scheduleData[key] ? `明日の予定は ${scheduleData[key]} だよ！` : "明日の予定はまだ決まってないみたい。";
            }
            else if (message.includes("数当て")) {
                status.hit_answer = Math.floor(Math.random() * 100) + 1;
                status.hitgame_flg = true;
                replyText = "1〜100の間で数字を当ててみて！";
            }
            else if (message.includes("雑魚")) {
                replyText = "は？誰が雑魚だって？（おこ）";
            } else {
                replyText = "んー、よくわかんない。日付とかプロフィールって聞いてみて？";
            }
        }

        msgElement.innerText = replyText;
        const area = document.getElementById("messages");
        area.scrollTop = area.scrollHeight;
    }

    function getFormattedDate(dateObj) {
        const y = dateObj.getFullYear();
        const m = String(dateObj.getMonth() + 1).padStart(2, '0');
        const d = String(dateObj.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    function addMessage(text, type) {
        const div = document.createElement("div");
        div.className = `msg ${type}`;
        div.innerText = text;
        const area = document.getElementById("messages");
        area.appendChild(div);
        area.scrollTop = area.scrollHeight;
        return div;
    }

    document.getElementById("user-input").addEventListener("keypress", (e) => {
        if (e.key === "Enter") chatProcess();
    });
</script>
</body>
</html>
